<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>Titanic 乘客資料管理</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
            font-size: 14px;
        }

        th {
            background-color: #f2f2f2;
        }

        .toolbar {
            margin-bottom: 20px;
        }

        .toolbar input,
        .toolbar button {
            padding: 6px;
            margin-right: 6px;
        }

        a {
            text-decoration: none;
            color: blue;
        }

        .pagination {
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <h1>Titanic 乘客資料管理</h1>

    <div class="toolbar">
        <a href="/passengers/new">新增乘客</a>
        <br><br>

        <input type="text" id="searchInput" placeholder="搜尋姓名">

        <button onclick="loadPassengers(1)">查詢</button>
    </div>

    <div id="summary"></div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>姓名</th>
                <th>性別</th>
                <th>年齡</th>
                <th>艙等</th>
                <th>是否生還</th>
                <th>票價</th>
                <th>登船港口</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="passengerTableBody"></tbody>
    </table>

    <div class="pagination">
        <button onclick="prevPage()">上一頁</button>
        <span id="pageInfo"></span>
        <button onclick="nextPage()">下一頁</button>
    </div>

    <script>
       
    </script>
</body>

</html>
