<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>編輯乘客</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input,
        select {
            padding: 6px;
            width: 300px;
        }

        button {
            margin-top: 20px;
            padding: 8px 16px;
        }
    </style>
</head>

<body>
    <h1>編輯乘客</h1>

    <form id="passengerForm">
        <label>PassengerId</label>
        <input name="PassengerId" disabled>

        <label>Survived</label>
        <select name="Survived" required>
            <option value="0">0：未生還</option>
            <option value="1">1：生還</option>
        </select>

        <label>Pclass</label>
        <select name="Pclass" required>
            <option value="1">1 等艙</option>
            <option value="2">2 等艙</option>
            <option value="3">3 等艙</option>
        </select>

        <label>Name</label>
        <input name="Name" required>

        <label>Sex</label>
        <select name="Sex" required>
            <option value="male">male</option>
            <option value="female">female</option>
        </select>

        <label>Age</label>
        <input name="Age" type="number" step="0.01">

        <label>SibSp</label>
        <input name="SibSp" type="number" min="0" required>

        <label>Parch</label>
        <input name="Parch" type="number" min="0" required>

        <label>Ticket</label>
        <input name="Ticket" required>

        <label>Fare</label>
        <input name="Fare" type="number" step="0.0001" min="0" required>

        <label>Cabin</label>
        <input name="Cabin">

        <label>Embarked</label>
        <select name="Embarked">
            <option value="">未知</option>
            <option value="C">C</option>
            <option value="Q">Q</option>
            <option value="S">S</option>
        </select>

        <button type="submit">更新</button>
        <a href="/">回首頁</a>
    </form>

    <script>
        
    </script>
</body>

</html>
